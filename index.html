<script>
async function generate() {
  let w = document.getElementById("weight").value;
  let g = document.getElementById("goal").value;

  document.getElementById("output").innerText = "Thinking...";

  try {
    const res = await fetch("http://127.0.0.1:11434/api/generate", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        model: "gemma:2b",
        prompt: `Create a gym and diet plan for ${w}kg person with goal ${g}. Indian budget friendly.`,
        stream: false
      })
    });

    const data = await res.json();
    document.getElementById("output").innerText = data.response;

  } catch (e) {
    document.getElementById("output").innerText = "Error connecting to AI";
    console.error(e);
  }
}
</script>
